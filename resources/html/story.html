<h1> Story Phase </h1>
    <ol>
        <li>Proceeding around the table, each wizard removes either one week of Time or his Engagement and either
            performs the associated mechanical effect or roleplays the scene.</li>
        <li>This continues until the only weeks remaining are scheduled for the Wizardmoot.</li>
    </ol>
